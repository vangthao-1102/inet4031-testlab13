apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ticket-app
spec:
  replicas: ___             # FILL IN: 1
  selector:
    matchLabels:
      app: ___              # FILL IN: web
  template:
    metadata:
      labels:
        app: ___            # FILL IN: web  (must match matchLabels above)
    spec:
      containers:
        - name: web
          image: ___        # FILL IN: YOUR_DOCKERHUB_USERNAME/apache-web:latest
          ports:
            - containerPort: ___ # FILL IN: 80

---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ticket-app
spec:
  type: NodePort
  selector:
    app: ___                # FILL IN: web
  ports:
    - port: ___             # FILL IN: 80
      targetPort: ___       # FILL IN: 80
      nodePort: 30080       # External port on your VM — http://<VM-IP>:30080
